<svg xmlns="http://www.w3.org/2000/svg" width="640" height="220" viewBox="0 0 640 220" role="img" aria-label="栈输入输出示意图">
  <rect width="640" height="220" fill="#f7f9fd"/>
  <g font-family="Arial, sans-serif" fill="#26344b">
    <text x="56" y="54" font-size="20" font-weight="700">输入序列</text>
    <text x="56" y="88" font-size="22">1 → 2 → 3 → 4 → 5</text>
    <text x="390" y="54" font-size="20" font-weight="700">栈</text>
  </g>
  <g fill="#ffffff" stroke="#9fb2d8" stroke-width="2">
    <rect x="380" y="70" width="120" height="30"/>
    <rect x="380" y="100" width="120" height="30"/>
    <rect x="380" y="130" width="120" height="30"/>
    <path d="M380 70 V170 H500 V70" fill="none"/>
  </g>
  <g fill="#255ce6" font-family="Arial, sans-serif" font-size="18" font-weight="700">
    <text x="435" y="121">2</text>
    <text x="435" y="151">1</text>
  </g>
  <path d="M285 116 C320 80 345 80 378 86" fill="none" stroke="#e07a1f" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 88 C545 88 560 112 522 136" fill="none" stroke="#255ce6" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#e07a1f"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#255ce6"/>
    </marker>
  </defs>
</svg>
